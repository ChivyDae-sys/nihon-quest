<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihon-Quest: The Final Gate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Permanent+Marker&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p5-red: #d31212; --p5-black: #000000; --p5-white: #ffffff; --p5-gold: #ffd700; --p5-teal: #0f766e; }
        body { background-color: var(--p5-black); color: var(--p5-white); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Tema Gerbang Kuno: Hijau Zamrud Magis */
        .persona-bg { background: linear-gradient(135deg, #021c1e 0%, #064e3b 100%); background-attachment: fixed; }
        .bg-lines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(45deg, #000, #000 10px, #012a27 10px, #012a27 20px); z-index: -1; opacity: 0.8; }
        
        .pixel-font { font-family: 'Press Start 2P', cursive; }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        .persona-border { border: 4px solid var(--p5-white); transform: skew(-2deg); box-shadow: 8px 8px 0px var(--p5-teal); }
        .btn-persona { background-color: var(--p5-white); color: var(--p5-black); font-weight: 900; transform: skew(-5deg); transition: all 0.2s ease; border-left: 10px solid var(--p5-teal); border-bottom: 4px solid #999; }
        .btn-persona:hover { background-color: var(--p5-teal); color: var(--p5-white); transform: skew(-5deg) scale(1.05); padding-left: 1.5rem; border-color: #042f2e; }
        .gold-box { background-color: var(--p5-black); border: 2px solid var(--p5-gold); transform: skew(-10deg); box-shadow: 4px 4px 0px var(--p5-gold); }

        .bar-container { background: #333; height: 12px; transform: skew(-10deg); border: 2px solid white; position: relative; }
        .hp-fill { width: 100%; height: 100%; background: var(--p5-red); box-shadow: 0 0 10px var(--p5-red); transition: width 0.3s; }

        .guardian-hp-container { background: #333; height: 16px; border: 2px solid white; width: 100%; margin-top: 10px; transform: skew(-5deg); position: relative; }
        .guardian-hp-fill { background: var(--p5-teal); width: 100%; height: 100%; transition: width 0.4s ease-out; box-shadow: 0 0 10px var(--p5-teal); }

        .levitate { animation: float 4s infinite alternate ease-in-out; }
        @keyframes float { 0% { transform: translateY(0px); } 100% { transform: translateY(-15px); } }
        
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 40% { transform: translate(3px, 2px) rotate(-1deg); } 100% { transform: translate(1px, -1px) rotate(0deg); } }

        /* ANIMASI TRANSISI STAGE 5 */
        #stage-transition {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--p5-black); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: fadeOutStage 1s ease-in-out 2.5s forwards; pointer-events: none;
        }
        @keyframes fadeOutStage { 0% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }
        .glitch-text { text-shadow: 3px 0 var(--p5-teal), -3px 0 var(--p5-gold); animation: glitch 0.3s infinite; }
        @keyframes glitch { 0% { transform: translate(0) } 20% { transform: translate(-2px, 2px) } 40% { transform: translate(-2px, -2px) } 60% { transform: translate(2px, 2px) } 80% { transform: translate(2px, -2px) } 100% { transform: translate(0) } }
    </style>
</head>
<body class="persona-bg p-6 md:p-12">

    <div id="stage-transition">
        <h1 class="marker-font text-6xl md:text-8xl text-white mb-4 glitch-text transform -skew-x-12">STAGE 5</h1>
        <h2 class="pixel-font text-sm md:text-lg text-teal-400 tracking-widest border-y-2 border-teal-400 py-2">THE ABYSSAL GATE</h2>
    </div>

    <div class="bg-lines"></div>

    <header class="max-w-5xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-4 text-black transform -rotate-1 shadow-[10px_10px_0px_#0f766e]">
        <div class="flex flex-col ml-2">
            <span class="pixel-font text-[8px] text-teal-700 mb-1">STAGE 5 | QUEST 8 (PUZZLE)</span>
            <h1 class="marker-font text-2xl md:text-3xl uppercase tracking-tighter">THE FINAL GATE</h1>
        </div>
        
        <div class="flex flex-wrap gap-4 items-end mt-4 md:mt-0">
            <div class="w-24 md:w-32">
                <p class="pixel-font text-[10px] mb-1">HP <span id="hp-text-header" class="text-[8px] text-gray-400"></span></p>
                <div class="bar-container"><div id="player-hp" class="hp-fill"></div></div>
            </div>
            <div class="gold-box px-4 py-2 text-white text-right w-24">
                <p class="pixel-font text-[8px] text-yellow-400 mb-1">GOLD</p>
                <p id="gold-display" class="marker-font text-xl text-yellow-400">0</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
        
        <div class="flex flex-col items-center justify-center space-y-4">
            <div class="levitate relative mt-8 flex flex-col items-center">
                <div class="w-48 h-48 bg-teal-900 rounded-full absolute top-0 -z-10 mix-blend-screen blur-2xl"></div>
                
                <img src="guardian.webp" alt="Gate Guardian" class="w-56 h-56 object-contain drop-shadow-[0_0_20px_rgba(15,118,110,0.8)] z-10">
                
                <div class="bg-black text-white marker-font px-4 py-1 rotate-3 border-2 border-[#0f766e] mt-2 w-64 text-center shadow-[4px_4px_0px_#0f766e] z-20">
                    GATE GUARDIAN
                </div>
                <div class="w-64 guardian-hp-container -mt-1 z-10">
                    <div id="guardian-hp-bar" class="guardian-hp-fill"></div>
                    <p id="guardian-hp-text" class="absolute inset-0 text-[10px] pixel-font text-white leading-[12px] drop-shadow-md z-10 text-center">3 SEALS LEFT</p>
                </div>
            </div>
            
            <div class="w-full persona-border bg-black p-6 relative mt-4">
                <div class="absolute -top-4 left-4 bg-[#0f766e] text-white px-3 py-1 marker-font text-lg skew-x-[-10deg]">GUARDIAN LOG</div>
                <p id="dialog-main" class="text-lg font-black mt-2 leading-relaxed text-teal-100">「扉を開けたければ、謎を解け。」</p>
                <p id="dialog-romaji" class="text-gray-400 italic text-sm mt-1">(Tobira o aketakereba, nazo o toke. - Jika ingin membuka pintu, pecahkan teka-teki ini.)</p>
            </div>
        </div>

        <div id="action-menu" class="grid grid-cols-1 gap-4">
            </div>
    </main>

    <script>
        // --- SISTEM BGM ---
        const bgm = new Audio('bgm.mp3');
        bgm.loop = true; 
        function handleBGM() {
            if (localStorage.getItem('playMusic') === 'true') {
                let savedTime = parseFloat(localStorage.getItem('musicTime')) || 0;
                bgm.currentTime = savedTime;
                bgm.play().catch(() => {});
                setInterval(() => { if (!bgm.paused) localStorage.setItem('musicTime', bgm.currentTime); }, 1000);
            }
        }
        window.addEventListener('load', handleBGM);
        window.addEventListener('click', () => { if (bgm.paused && localStorage.getItem('playMusic') === 'true') bgm.play(); }, { once: true });

        // --- LOAD DATA (PERSISTEN) ---
        let playerName = localStorage.getItem('playerName') || 'HERO';
        let playerGold = parseInt(localStorage.getItem('playerGold')) || 0;
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
        
        let maxPlayerHp = parseInt(localStorage.getItem('maxPlayerHp')) || 100;
        let savedHp = parseInt(localStorage.getItem('playerHp'));
        let playerHp = !isNaN(savedHp) ? savedHp : maxPlayerHp;

        // Sistem Seal/Segel (Bukan HP biasa, butuh 3 kali jawab benar)
        let guardianSeals = 3; 
        const maxSeals = 3;
        let isGameOver = false;

        document.getElementById('gold-display').innerText = playerGold;
        updateHpUI();

        function updateHpUI() {
            document.getElementById('player-hp').style.width = (playerHp / maxPlayerHp * 100) + '%';
            document.getElementById('hp-text-header').innerText = `(${playerHp}/${maxPlayerHp})`;
        }

        // --- DATA KUIS DOKKAI (READING COMPREHENSION) ---
        const riddleQuizzes = [
            { 
                question: "「黒くて、夜に飛ぶ鳥は何ですか？」<br><span class='text-xs text-gray-400 font-normal mt-1 block'>(Kurokute, yoru ni tobu tori wa nan desu ka?)</span>", 
                a: "A. にわとり (Niwatori)", b: "B. からす (Karasu)", c: "C. すずめ (Suzume)", correct: 'b' 
            },
            { 
                question: "「朝、一番早く鳴く動物は何ですか？」<br><span class='text-xs text-gray-400 font-normal mt-1 block'>(Asa, ichiban hayaku naku doubutsu wa nan desu ka?)</span>", 
                a: "A. 犬 (Inu)", b: "B. 猫 (Neko)", c: "C. 鶏 (Niwatori)", correct: 'c' 
            },
            { 
                question: "「白くて、冷たくて、冬に降るものは何ですか？」<br><span class='text-xs text-gray-400 font-normal mt-1 block'>(Shirokute, tsumetakute, fuyu ni furu mono wa nan desu ka?)</span>", 
                a: "A. 雪 (Yuki)", b: "B. 雨 (Ame)", c: "C. 雲 (Kumo)", correct: 'a' 
            },
            { 
                question: "「赤くて、丸くて、甘い果物は何ですか？」<br><span class='text-xs text-gray-400 font-normal mt-1 block'>(Akakute, marukute, amai kudamono wa nan desu ka?)</span>", 
                a: "A. りんご (Ringo)", b: "B. バナナ (Banana)", c: "C. みかん (Mikan)", correct: 'a' 
            }
        ];
        let currentQuiz = null;

        function renderMainMenu() {
            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <div class="bg-[#0f766e] p-2 transform -skew-x-12 inline-block mb-2 shadow-[4px_4px_0px_#ffffff]">
                    <p class="marker-font text-2xl px-2 text-white">ANCIENT RIDDLE</p>
                </div>
                
                <button onclick="startRiddleQuiz()" class="btn-persona p-5 group text-left flex flex-col">
                    <span class="pixel-font text-sm">01. とく (Toku)</span>
                    <span class="font-bold text-gray-500 group-hover:text-black mt-1">- Pecahkan Mantra (Reading Comprehension)</span>
                </button>

                <button onclick="battleAction('run')" class="btn-persona p-5 group text-left flex flex-col hover:bg-black border-[#0f766e] mt-4">
                    <span class="pixel-font text-sm text-[#0f766e]">02. にげる (Nigeru)</span>
                    <span class="font-bold text-gray-500 group-hover:text-teal-400 mt-1">- Menyerah dan pergi</span>
                </button>
            `;
        }
        
        renderMainMenu();

        function battleAction(action) {
            if(isGameOver) return; 
            if (action === 'run') {
                triggerGameOver("Kamu tidak pantas melewati gerbang ini. Kutukan patung mengubahmu menjadi batu...");
            }
        }

        function startRiddleQuiz() {
            currentQuiz = riddleQuizzes[Math.floor(Math.random() * riddleQuizzes.length)];
            
            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <div class="bg-yellow-600 p-2 transform -skew-x-12 inline-block shadow-[4px_4px_0px_#ffffff]">
                    <p class="marker-font text-xl px-2 text-black">READ CAREFULLY!</p>
                </div>
                
                <div class="bg-black border-2 border-[#0f766e] p-5 mb-2 transform skew-x-[-2deg]">
                    <p class="font-bold text-white text-xl leading-relaxed">${currentQuiz.question}</p>
                </div>

                <div class="flex flex-col gap-2">
                    <button onclick="checkAnswer('a')" class="btn-persona p-4 text-left border-gray-400 font-bold">${currentQuiz.a}</button>
                    <button onclick="checkAnswer('b')" class="btn-persona p-4 text-left border-gray-400 font-bold">${currentQuiz.b}</button>
                    <button onclick="checkAnswer('c')" class="btn-persona p-4 text-left border-gray-400 font-bold">${currentQuiz.c}</button>
                </div>
            `;
        }

        function checkAnswer(selectedOption) {
            const dialogMain = document.getElementById('dialog-main');
            const dialogRomaji = document.getElementById('dialog-romaji');
            
            document.body.classList.remove('shake');
            void document.body.offsetWidth;
            document.body.classList.add('shake');

            if (selectedOption === currentQuiz.correct) {
                // JAWABAN BENAR: 1 Segel Pecah
                guardianSeals -= 1;
                
                document.getElementById('guardian-hp-bar').style.width = (guardianSeals / maxSeals * 100) + '%';
                document.getElementById('guardian-hp-text').innerText = guardianSeals + ' SEALS LEFT';

                dialogMain.innerHTML = `「正解だ。封印が一つ解けた...」`;
                dialogRomaji.innerHTML = "(Seikai da. Fuuin ga hitotsu toketa... - Benar. Satu segel telah terbuka...)";

                if(guardianSeals === 0) {
                    setTimeout(triggerWin, 800); 
                } else {
                    renderMainMenu();
                }

            } else {
                // JAWABAN SALAH: Kena kutukan laser
                let takenDamage = 45; 
                playerHp -= takenDamage;
                if(playerHp < 0) playerHp = 0;
                
                updateHpUI();
                
                dialogMain.innerHTML = `「愚かな...！」<br><span class='text-red-500'>石像からの呪い！ ${takenDamage} ダメージ！</span>`;
                dialogRomaji.innerHTML = "(Oroka na...! Sekizou kara no noroi! - Bodoh...! Kutukan dari patung batu!)";

                if(playerHp <= 0) {
                    setTimeout(() => triggerGameOver("Kamu gagal menjawab teka-teki. Nyawamu dihisap oleh gerbang kuno."), 800);
                } else {
                    renderMainMenu();
                }
            }
        }

        function triggerGameOver(customMessage) {
            isGameOver = true;
            document.getElementById('player-hp').style.width = '0%';
            const dialogMain = document.getElementById('dialog-main');
            
            dialogMain.innerHTML = "<span class='text-red-600'>「目の前が真っ暗になった...」</span>";
            
            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <div class="bg-black border-4 border-red-600 p-8 text-center transform skew-x-[-2deg] shadow-[8px_8px_0px_#d31212] mt-4">
                    <h1 class="marker-font text-5xl md:text-7xl mb-4 text-red-600 glitch-text">GAME OVER</h1>
                    <p class="pixel-font text-xs mb-8 text-gray-400 leading-relaxed">${customMessage}</p>
                    <a href="index.html" class="inline-block bg-white text-black px-8 py-4 border-2 border-black hover:bg-red-600 hover:text-white transition-colors marker-font text-2xl transform skew-x-[-10deg]">
                        TRY AGAIN
                    </a>
                </div>
            `;
        }

        function triggerWin() {
            isGameOver = true;
            
            playerGold += 400; // Hadiah dari gerbang
            localStorage.setItem('playerGold', playerGold);
            localStorage.setItem('playerHp', playerHp); 
            document.getElementById('gold-display').innerText = playerGold;

            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <div class="bg-white border-4 border-black p-8 text-center transform skew-x-[2deg] shadow-[8px_8px_0px_#0f766e] mt-4">
                    <h1 class="marker-font text-4xl md:text-5xl mb-4 text-black">GATE OPENED!</h1>
                    <p class="pixel-font text-[10px] mb-2 text-gray-600">REWARDS:</p>
                    <p class="marker-font text-yellow-500 text-3xl">+ 400 GOLD</p>
                    <p class="marker-font text-teal-800 text-sm mt-2 font-bold">"LOGIC MASTER!"</p>
                    
                    <a href="quest9.html" class="inline-block mt-8 bg-black text-white px-8 py-4 border-2 border-white hover:bg-[#0f766e] transition-colors marker-font text-xl transform skew-x-[-10deg]">
                        ENTER THE ABYSS ▶
                    </a>
                </div>
            `;
        }
    </script>
</body>
</html>
