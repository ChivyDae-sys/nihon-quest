<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nihon-Quest: Cave Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Permanent+Marker&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p5-red: #d31212; --p5-black: #000000; --p5-white: #ffffff; --p5-gold: #ffd700; --p5-blue: #4a90e2; }
        body { background-color: var(--p5-black); color: var(--p5-white); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Tema Gua Inti: Lebih gelap dan intens */
        .persona-bg { background: linear-gradient(135deg, #050505 0%, #101020 100%); background-attachment: fixed; }
        .bg-lines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(45deg, #000, #000 10px, #0a0a0a 10px, #0a0a0a 20px); z-index: -1; opacity: 0.9; }
        
        .pixel-font { font-family: 'Press Start 2P', cursive; }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        .persona-border { border: 4px solid var(--p5-white); transform: skew(-2deg); box-shadow: 8px 8px 0px var(--p5-blue); }
        .btn-persona { background-color: var(--p5-white); color: var(--p5-black); font-weight: 900; transform: skew(-5deg); transition: all 0.2s ease; border-left: 10px solid var(--p5-blue); border-bottom: 4px solid #999; }
        .btn-persona:hover { background-color: var(--p5-blue); color: var(--p5-white); transform: skew(-5deg) scale(1.05); padding-left: 1.5rem; border-color: #2a5a8a; }
        .gold-box { background-color: var(--p5-black); border: 2px solid var(--p5-gold); transform: skew(-10deg); box-shadow: 4px 4px 0px var(--p5-gold); }

        .bar-container { background: #333; height: 12px; transform: skew(-10deg); border: 2px solid white; position: relative; }
        .hp-fill { width: 100%; height: 100%; background: var(--p5-red); box-shadow: 0 0 10px var(--p5-red); transition: width 0.3s; }

        /* HP Bar Golem dibikin lebih panjang karena dia Mid-Boss */
        .golem-hp-container { background: #333; height: 16px; border: 2px solid white; width: 100%; margin-top: 10px; transform: skew(-5deg); position: relative; }
        .golem-hp-fill { background: var(--p5-blue); width: 100%; height: 100%; transition: width 0.4s ease-out; box-shadow: 0 0 10px var(--p5-blue); }

        .monster-heavy { animation: heavyFloat 3s infinite alternate ease-in-out; }
        @keyframes heavyFloat { 0% { transform: translateY(0); } 100% { transform: translateY(-5px) scale(1.01); } }
        
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 40% { transform: translate(3px, 2px) rotate(-1deg); } 100% { transform: translate(1px, -1px) rotate(0deg); } }
        .glitch-text { text-shadow: 2px 0 red, -2px 0 blue; animation: glitch 0.2s infinite; }
        @keyframes glitch { 0% { transform: translate(0) } 20% { transform: translate(-2px, 2px) } 40% { transform: translate(-2px, -2px) } 60% { transform: translate(2px, 2px) } 80% { transform: translate(2px, -2px) } 100% { transform: translate(0) } }
    </style>
</head>
<body class="persona-bg p-6 md:p-12">
    <div class="bg-lines"></div>

    <header class="max-w-5xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-4 text-black transform -rotate-1 shadow-[10px_10px_0px_#4a90e2]">
        <div class="flex flex-col ml-2">
            <span class="pixel-font text-[8px] text-blue-600 mb-1">STAGE 2 | QUEST 4 (MID-BOSS)</span>
            <h1 class="marker-font text-2xl md:text-3xl uppercase tracking-tighter">CAVE CORE</h1>
        </div>
        
        <div class="flex flex-wrap gap-4 items-end mt-4 md:mt-0">
            <div class="w-24 md:w-32">
                <p class="pixel-font text-[10px] mb-1 text-gray-800">HP <span id="hp-text-header" class="text-[8px] text-gray-500"></span></p>
                <div class="bar-container"><div id="player-hp" class="hp-fill"></div></div>
            </div>
            <div class="gold-box px-4 py-2 text-white text-right w-24">
                <p class="pixel-font text-[8px] text-yellow-400 mb-1">GOLD</p>
                <p id="gold-display" class="marker-font text-xl text-yellow-400">0</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
        <div class="flex flex-col items-center justify-center space-y-4">
            <div class="monster-heavy relative mt-8 flex flex-col items-center">
                <div class="w-48 h-48 bg-blue-900 rounded-full absolute top-0 -z-10 mix-blend-multiply blur-2xl"></div>
                
                <img src="golem.jpg" alt="Rock Golem" class="w-56 h-56 object-contain drop-shadow-[0_0_20px_rgba(74,144,226,0.8)] z-10">
                
                <div class="bg-black text-white marker-font px-4 py-1 rotate-3 border-2 border-[#4a90e2] mt-2 w-64 text-center shadow-[4px_4px_0px_#4a90e2] z-20">
                    ROCK GOLEM LV. 30
                    <div class="golem-hp-container">
                        <div id="golem-hp-bar" class="golem-hp-fill"></div>
                        <p id="golem-hp-text" class="absolute inset-0 text-[10px] pixel-font text-white leading-[12px] drop-shadow-md z-10 text-center">150/150</p>
                    </div>
                </div>
            </div>
            
            <div class="w-full persona-border bg-black p-6 relative mt-4">
                <div class="absolute -top-4 left-4 bg-[#4a90e2] text-black px-3 py-1 marker-font text-lg skew-x-[-10deg]">BATTLE LOG</div>
                <p id="dialog-main" class="text-lg font-black mt-2 leading-relaxed text-blue-100">「ゴーレム が 道を塞いでいる！」</p>
                <p id="dialog-romaji" class="text-gray-400 italic text-sm mt-1">(Goremu ga michi o fusaide iru! - Golem menghalangi jalan!)</p>
            </div>
        </div>

        <div id="action-menu" class="grid grid-cols-1 gap-4"></div>
    </main>

    <script>
        // --- SISTEM BGM ---
        const bgm = new Audio('bgm.mp3');
        bgm.loop = true; 
        function handleBGM() {
            if (localStorage.getItem('playMusic') === 'true') {
                let savedTime = parseFloat(localStorage.getItem('musicTime')) || 0;
                bgm.currentTime = savedTime;
                bgm.play().catch(() => {});
                setInterval(() => { if (!bgm.paused) localStorage.setItem('musicTime', bgm.currentTime); }, 1000);
            }
        }
        window.addEventListener('load', handleBGM);
        window.addEventListener('click', () => { if (bgm.paused && localStorage.getItem('playMusic') === 'true') bgm.play(); }, { once: true });

        // --- LOAD DATA PLAYER ---
        let playerName = localStorage.getItem('playerName') || 'HERO';
        
        // Pengecekan Gold & HP biar nggak keriset
        let savedGold = parseInt(localStorage.getItem('playerGold'));
        let playerGold = !isNaN(savedGold) ? savedGold : 0; 
        
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
        
        let maxPlayerHp = parseInt(localStorage.getItem('maxPlayerHp')) || 100;
        let savedHp = parseInt(localStorage.getItem('playerHp'));
        let playerHp = !isNaN(savedHp) ? savedHp : maxPlayerHp;

        // --- STATUS MONSTER ---
        let golemHp = 150;
        const maxGolemHp = 150;
        let isGameOver = false;

        // --- FUNGSI UPDATE UI HP ---
        function updateHpUI() {
            document.getElementById('player-hp').style.width = (playerHp / maxPlayerHp * 100) + '%';
            document.getElementById('hp-text-header').innerText = `(${playerHp}/${maxPlayerHp})`;
        }

        // Update UI Awal
        document.getElementById('gold-display').innerText = playerGold;
        updateHpUI();
        document.getElementById('golem-hp-bar').style.width = '100%';

        // --- DATA KUIS PARTIKEL ---
        const particleQuizzes = [
            { question: "私 ___ 学生です。<br><span class='text-sm text-gray-400'>(Saya adalah murid.)</span>", a: "は (wa)", b: "を (wo)", c: "で (de)", correct: 'a' },
            { question: "パン ___ 食べます。<br><span class='text-sm text-gray-400'>(Makan roti.)</span>", a: "に (ni)", b: "を (wo)", c: "が (ga)", correct: 'b' },
            { question: "学校 ___ 行きます。<br><span class='text-sm text-gray-400'>(Pergi ke sekolah.)</span>", a: "で (de)", b: "を (wo)", c: "に (ni)", correct: 'c' },
            { question: "バス ___ 帰ります。<br><span class='text-sm text-gray-400'>(Pulang dengan bus.)</span>", a: "で (de)", b: "に (ni)", c: "を (wo)", correct: 'a' },
            { question: "雨 ___ 降っています。<br><span class='text-sm text-gray-400'>(Hujan turun.)</span>", a: "を (wo)", b: "が (ga)", c: "は (wa)", correct: 'b' }
        ];
        let currentQuiz = null;

        function renderMainMenu() {
            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <div class="bg-red-600 p-2 transform -skew-x-12 inline-block mb-2 shadow-[4px_4px_0px_#ffffff]">
                    <p class="marker-font text-2xl px-2 text-white">CHOOSE YOUR MOVE!</p>
                </div>
                <button onclick="startAttackQuiz()" class="btn-persona p-5 group text-left flex flex-col">
                    <span class="pixel-font text-sm">01. たたかう (Tatakau)</span>
                    <span class="font-bold text-gray-500 group-hover:text-black mt-1">- Cari Titik Lemah (Isi Partikel)</span>
                </button>
                <button onclick="battleAction('run')" class="btn-persona p-5 group text-left flex flex-col hover:bg-black border-[#4a90e2] mt-4">
                    <span class="pixel-font text-sm text-[#4a90e2]">02. にげる (Nigeru)</span>
                    <span class="font-bold text-gray-500 group-hover:text-blue-400 mt-1">- Kabur dari pertarungan</span>
                </button>`;
        }
        
        function battleAction(action) {
            if(isGameOver) return; 
            if (action === 'run') { triggerGameOver("Kamu lari ketakutan, tapi Golem melempar batu raksasa..."); }
        }

        renderMainMenu();

        function startAttackQuiz() {
            currentQuiz = particleQuizzes[Math.floor(Math.random() * particleQuizzes.length)];
            const menu = document.getElementById('action-menu');
            
            // Perbaikan warna kuis biar hitam pekat dan jadi putih kalau disorot (hover)
            menu.innerHTML = `
                <div class="bg-blue-600 p-2 transform -skew-x-12 inline-block shadow-[4px_4px_0px_#ffffff]">
                    <p class="marker-font text-xl px-2 text-white">FILL THE BLANK!</p>
                </div>
                <div class="bg-black border-2 border-[#4a90e2] p-4 mb-2 transform skew-x-[-2deg]">
                    <p class="font-bold text-white text-xl">${currentQuiz.question}</p>
                </div>
                
                <button onclick="checkAnswer('a')" class="btn-persona p-4 text-left border-gray-400 group mt-2">
                    <span class="font-bold text-lg text-blue-600 group-hover:text-white mr-2">A.</span>
                    <span class="font-bold text-lg text-black group-hover:text-white">${currentQuiz.a}</span>
                </button>
                
                <button onclick="checkAnswer('b')" class="btn-persona p-4 text-left border-gray-400 group mt-2">
                    <span class="font-bold text-lg text-blue-600 group-hover:text-white mr-2">B.</span>
                    <span class="font-bold text-lg text-black group-hover:text-white">${currentQuiz.b}</span>
                </button>
                
                <button onclick="checkAnswer('c')" class="btn-persona p-4 text-left border-gray-400 group mt-2">
                    <span class="font-bold text-lg text-blue-600 group-hover:text-white mr-2">C.</span>
                    <span class="font-bold text-lg text-black group-hover:text-white">${currentQuiz.c}</span>
                </button>`;
        }

        function checkAnswer(selectedOption) {
            const dialogMain = document.getElementById('dialog-main');
            const dialogRomaji = document.getElementById('dialog-romaji');
            
            document.body.classList.remove('shake');
            void document.body.offsetWidth;
            document.body.classList.add('shake');

            if (selectedOption === currentQuiz.correct) {
                let damage = inventory.includes("Katana") ? 75 : 50; 
                golemHp -= damage;
                if(golemHp < 0) golemHp = 0;

                // UPDATE UI DARAH GOLEM
                document.getElementById('golem-hp-bar').style.width = (golemHp / maxGolemHp * 100) + '%';
                document.getElementById('golem-hp-text').innerText = golemHp + '/' + maxGolemHp;

                dialogMain.innerHTML = `「弱点に命中！装甲が砕けた！」<br><span class='text-[#4a90e2]'>${damage} ダメージ！</span>`;
                dialogRomaji.innerHTML = "(Jakuten ni meichuu! Soukou ga kudaketa! - Hit titik lemah! Armornya hancur!)";

                if(golemHp <= 0) {
                    setTimeout(triggerWin, 800); 
                } else {
                    renderMainMenu();
                }
            } else {
                let takenDamage = 40;
                playerHp -= takenDamage;
                if(playerHp < 0) playerHp = 0;
                
                // Panggil fungsi Update UI dan SIMPAN HP ke Memori
                updateHpUI();
                localStorage.setItem('playerHp', playerHp);
                
                dialogMain.innerHTML = `「硬い！攻撃が弾かれた！」<br><span class='text-red-500'>ゴーレムの反撃！${takenDamage} ダメージ！</span>`;
                dialogRomaji.innerHTML = "(Katai! Kougeki ga hajikareta! - Keras! Seranganmu terpental!)";

                if(playerHp <= 0) {
                    setTimeout(() => triggerGameOver("Kamu dihancurkan oleh Golem..."), 800);
                } else {
                    renderMainMenu();
                }
            }
        }

        function triggerGameOver(customMessage) {
            isGameOver = true;
            document.getElementById('player-hp').style.width = '0%';
            const dialogMain = document.getElementById('dialog-main');
            dialogMain.innerHTML = "<span class='text-red-600'>「目の前が真っ暗になった...」</span>";
            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <div class="bg-black border-4 border-red-600 p-8 text-center transform skew-x-[-2deg] shadow-[8px_8px_0px_#d31212] mt-4">
                    <h1 class="marker-font text-5xl md:text-7xl mb-4 text-red-600 glitch-text">GAME OVER</h1>
                    <p class="pixel-font text-xs mb-8 text-gray-400 leading-relaxed">${customMessage}</p>
                    <a href="index.html" class="inline-block bg-white text-black px-8 py-4 border-2 border-black hover:bg-red-600 hover:text-white transition-colors marker-font text-2xl transform skew-x-[-10deg]">TRY AGAIN</a>
                </div>`;
        }

        function triggerWin() {
            isGameOver = true;
            playerGold += 500;
            localStorage.setItem('playerGold', playerGold);
            localStorage.setItem('playerHp', playerHp); // SAVE HP SAAT MENANG

            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <div class="bg-white border-4 border-black p-8 text-center transform skew-x-[2deg] shadow-[8px_8px_0px_#4a90e2] mt-4">
                    <h1 class="marker-font text-4xl md:text-5xl mb-4 text-black">MID-BOSS DEFEATED!</h1>
                    <p class="marker-font text-yellow-500 text-3xl">+ 500 GOLD</p>
                    <p class="marker-font text-blue-600 text-sm mt-2 font-bold">"PARTICLE MASTER!"</p>
                    <a href="quest5.html" class="inline-block mt-8 bg-black text-white px-8 py-4 border-2 border-white hover:bg-[#4a90e2] transition-colors marker-font text-xl transform skew-x-[-10deg]">NEXT: CAMPFIRE ▶</a>
                </div>`;
        }
    </script>
</body>
</html>
