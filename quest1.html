<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihon-Quest: Armory Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Permanent+Marker&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p5-red: #d31212; --p5-black: #000000; --p5-white: #ffffff; --p5-gold: #ffd700; }
        body { background-color: var(--p5-black); color: var(--p5-white); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .persona-bg { background: linear-gradient(135deg, #000 0%, #1a0000 100%); background-attachment: fixed; }
        .pixel-font { font-family: 'Press Start 2P', cursive; }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        .persona-border { border: 4px solid var(--p5-white); transform: skew(-2deg); box-shadow: 8px 8px 0px var(--p5-red); }
        .btn-persona { background-color: var(--p5-white); color: var(--p5-black); font-weight: 900; transform: skew(-5deg); transition: all 0.2s ease; border-left: 10px solid var(--p5-red); border-bottom: 4px solid #999;}
        .btn-persona:hover { background-color: var(--p5-red); color: var(--p5-white); transform: skew(-5deg) scale(1.05); padding-left: 1.5rem; }
        .gold-box { background-color: var(--p5-black); border: 2px solid var(--p5-gold); transform: skew(-10deg); box-shadow: 4px 4px 0px var(--p5-gold); }
        .inventory-box { border: 2px dashed var(--p5-white); background: rgba(0,0,0,0.8); }
        
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 40% { transform: translate(3px, 2px) rotate(-1deg); } 100% { transform: translate(1px, -1px) rotate(0deg); } }

        /* ANIMASI TRANSISI STAGE 1 */
        #stage-transition {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--p5-black); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: fadeOutStage 1s ease-in-out 2.5s forwards; pointer-events: none;
        }
        @keyframes fadeOutStage { 0% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }
        .glitch-text { text-shadow: 3px 0 red, -3px 0 blue; animation: glitch 0.3s infinite; }
        @keyframes glitch { 0% { transform: translate(0) } 20% { transform: translate(-2px, 2px) } 40% { transform: translate(-2px, -2px) } 60% { transform: translate(2px, 2px) } 80% { transform: translate(2px, -2px) } 100% { transform: translate(0) } }
    </style>
</head>
<body class="persona-bg p-6 md:p-12">
    
    <div id="stage-transition">
        <h1 class="marker-font text-6xl md:text-8xl text-white mb-4 glitch-text transform -skew-x-12">STAGE 1</h1>
        <h2 class="pixel-font text-sm md:text-lg text-red-600 tracking-widest border-y-2 border-red-600 py-2">THE AWAKENING</h2>
    </div>

    <header class="max-w-5xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-4 text-black transform -rotate-1 shadow-[10px_10px_0px_#d31212]">
        <div class="flex items-center gap-4">
            <a href="index.html" class="bg-black text-white px-4 py-2 marker-font text-sm transform -skew-x-12 hover:bg-red-600 transition-colors border-2 border-transparent hover:border-black shadow-[4px_4px_0px_#d31212]">
                ◀ HOME
            </a>
            <div class="flex flex-col">
                <span class="pixel-font text-[8px] text-red-600 mb-1">STAGE 1 | QUEST 1</span>
                <h1 class="marker-font text-2xl md:text-3xl uppercase tracking-tighter">ARMORY SHOP</h1>
            </div>
        </div>
        
        <div class="flex gap-4 items-end mt-4 md:mt-0">
            <div class="gold-box px-4 py-2 text-white text-right w-32">
                <p class="pixel-font text-[8px] text-yellow-400 mb-1">GOLD</p>
                <p id="gold-display" class="marker-font text-xl text-yellow-400">---</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="persona-border bg-black p-8 relative min-h-[200px]">
                <div class="absolute -top-6 left-6 bg-red-600 px-4 py-1 marker-font text-xl skew-x-[-15deg]">KAJIYA-SAN</div>
                <div class="mt-4">
                    <p id="dialog-main" class="text-2xl font-bold leading-relaxed mb-4">「いらっしゃいませ！武器を作りたいですか？」</p>
                    <p id="dialog-romaji" class="text-gray-400 italic text-sm">"Irasshaimase! Buki o tsukuritai desu ka? - Selamat datang! Ingin membuat senjata?"</p>
                </div>
            </div>

            <div class="inventory-box p-4 transform rotate-1 mt-6">
                <h3 class="marker-font text-2xl mb-2 text-red-500">BACKPACK (INVENTORY)</h3>
                <div id="inventory-list" class="flex gap-4">
                    <p class="text-gray-500 italic text-sm">Tas masih kosong...</p>
                </div>
            </div>
        </div>

        <div id="action-menu" class="flex flex-col gap-4 justify-center">
            </div>
    </main>

    <script>
        const bgm = new Audio('bgm.mp3');
        bgm.loop = true; 
        function handleBGM() {
            if (localStorage.getItem('playMusic') === 'true') {
                let savedTime = parseFloat(localStorage.getItem('musicTime')) || 0;
                bgm.currentTime = savedTime;
                bgm.play().catch(() => {});
                setInterval(() => { if (!bgm.paused) localStorage.setItem('musicTime', bgm.currentTime); }, 1000);
            }
        }
        window.addEventListener('load', handleBGM);
        window.addEventListener('click', () => { if (bgm.paused && localStorage.getItem('playMusic') === 'true') bgm.play(); }, { once: true });

        let playerName = localStorage.getItem('playerName') || 'HERO';
        let playerGold = 1000;
        let inventory = [];

        try {
            let savedGold = parseInt(localStorage.getItem('playerGold'));
            if (!isNaN(savedGold)) playerGold = savedGold;
            let savedInv = localStorage.getItem('inventory');
            if (savedInv) inventory = JSON.parse(savedInv);
        } catch (e) { console.log("Save data aman."); }

        document.getElementById('gold-display').innerText = playerGold;
        updateInventoryUI();

        function updateInventoryUI() {
            const invList = document.getElementById('inventory-list');
            if (inventory.length > 0) {
                invList.innerHTML = '';
                inventory.forEach(item => {
                    invList.innerHTML += `<div class="bg-white text-black font-bold px-4 py-2 transform skew-x-12 shadow-[2px_2px_0px_#d31212]">🗡️ ${item}</div>`;
                });
            } else {
                invList.innerHTML = '<p class="text-gray-500 italic text-sm">Tas masih kosong...</p>';
            }
        }

        function renderMainMenu() {
            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <h2 class="marker-font text-3xl text-red-600 mb-2 italic">TAKE YOUR TIME...</h2>
                
                <button onclick="openCraftMenu()" class="btn-persona p-4 text-left group flex flex-col">
                    <span class="pixel-font text-xs">01. つくる (Tsukuru)</span>
                    <span class="font-bold text-gray-500 group-hover:text-black mt-1">- Tempa Katana (Biaya: 200 G)</span>
                </button>
                
                <button onclick="shopAction('ask')" class="btn-persona p-4 text-left group flex flex-col">
                    <span class="pixel-font text-xs">02. はなす (Hanasu)</span>
                    <span class="font-bold text-gray-500 group-hover:text-black mt-1">- Ngobrol dengan Kajiya</span>
                </button>
                
                <a href="quest2.html" class="btn-persona border-red-600 p-4 text-center block font-bold hover:bg-black group shadow-[4px_4px_0px_#d31212] mt-4">
                    <span class="pixel-font text-sm text-red-600 group-hover:text-red-500">▶ NEXT STAGE</span>
                    <span class="block mt-1 text-gray-500 text-xs">Pergi ke Maboroshi Forest</span>
                </a>
            `;
        }

        renderMainMenu();

        function shopAction(action) {
            const dialogMain = document.getElementById('dialog-main');
            const dialogRomaji = document.getElementById('dialog-romaji');
            if (action === 'ask') {
                dialogMain.innerHTML = "「良い刀を作るには、正しい材料の組み合わせが必要です！」";
                dialogRomaji.innerHTML = "(Yoi katana o tsukuru ni wa, tadashii zairyou no kumiawase ga hitsuyou desu! - Untuk membuat pedang yang bagus, butuh kombinasi bahan yang benar!)";
            }
        }

        function openCraftMenu() {
            const dialogMain = document.getElementById('dialog-main');
            const dialogRomaji = document.getElementById('dialog-romaji');
            const menu = document.getElementById('action-menu');

            if (inventory.includes("Katana")) {
                dialogMain.innerHTML = `「もう刀は持っていますよ、${playerName}！」`;
                dialogRomaji.innerHTML = `(Mou katana wa motteimasu yo! - Kamu kan sudah punya pedang, ${playerName}!)`;
                return;
            }

            if (playerGold < 200) {
                dialogMain.innerHTML = "「お金が足りないようですね...」";
                dialogRomaji.innerHTML = `(Okane ga tarinai you desu ne... - Uangmu tidak cukup, ${playerName}!)`;
                return;
            }

            dialogMain.innerHTML = "「刀の材料は『鉄』と『火』です。正しい材料を選んでください！」";
            dialogRomaji.innerHTML = `(Katana no zairyou wa 'Tetsu' to 'Hi' desu. Tadashii zairyou o erande kudasai! - Bahan katana adalah 'Besi' dan 'Api'. Silakan pilih bahan yang benar, ${playerName}!)`;

            menu.innerHTML = `
                <div class="bg-blue-600 p-2 transform -skew-x-12 inline-block mb-2 shadow-[4px_4px_0px_#ffffff]">
                    <p class="marker-font text-xl px-2 text-white">SELECT MATERIALS!</p>
                </div>
                
                <button onclick="executeCraft('wrong1')" class="btn-persona p-4 text-left border-gray-400 group">
                    <span class="font-bold">A. 水 (Mizu) + 木 (Ki)</span>
                    <span class="block text-xs text-gray-400 mt-1">(Air & Kayu)</span>
                </button>
                
                <button onclick="executeCraft('correct')" class="btn-persona p-4 text-left border-gray-400 group">
                    <span class="font-bold">B. 鉄 (Tetsu) + 火 (Hi)</span>
                    <span class="block text-xs text-gray-400 mt-1">(Besi & Api)</span>
                </button>
                
                <button onclick="executeCraft('wrong2')" class="btn-persona p-4 text-left border-gray-400 group">
                    <span class="font-bold">C. 金 (Kin) + 土 (Tsuchi)</span>
                    <span class="block text-xs text-gray-400 mt-1">(Emas & Tanah)</span>
                </button>

                <button onclick="renderMainMenu()" class="mt-4 text-gray-400 underline font-bold hover:text-white text-right">CANCEL</button>
            `;
        }

        function executeCraft(result) {
            const dialogMain = document.getElementById('dialog-main');
            const dialogRomaji = document.getElementById('dialog-romaji');
            
            document.body.classList.remove('shake');
            void document.body.offsetWidth;
            document.body.classList.add('shake');

            if (result === 'correct') {
                playerGold -= 200;
                inventory.push("Katana"); 
                
                localStorage.setItem('playerGold', playerGold);
                localStorage.setItem('inventory', JSON.stringify(inventory));
                
                document.getElementById('gold-display').innerText = playerGold;
                updateInventoryUI();

                dialogMain.innerHTML = `「素晴らしい！見事な刀が完成しました！」`;
                dialogRomaji.innerHTML = `(Subarashii! Migoto na katana ga kansei shimashita! - Luar biasa! Katana yang menakjubkan telah selesai dibuat!)`;
            } else {
                playerGold -= 50; 
                if(playerGold < 0) playerGold = 0;
                localStorage.setItem('playerGold', playerGold);
                document.getElementById('gold-display').innerText = playerGold;

                dialogMain.innerHTML = `「ドカーン！<span class='text-red-500'>間違った材料だ！</span>」`;
                dialogRomaji.innerHTML = `(Dokaan! Machigatta zairyou da! - BOOM! Bahannya salah! <br><span class='text-sm text-red-500'>*Tungku meledak. Kamu rugi 50 Gold untuk biaya ganti rugi bengkel.*</span>)`;
            }
            renderMainMenu();
        }
    </script>
</body>
</html>
