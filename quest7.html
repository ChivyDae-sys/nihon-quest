<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nihon-Quest: Samurai Dojo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Permanent+Marker&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p5-red: #d31212; --p5-black: #000000; --p5-white: #ffffff; --p5-gold: #ffd700; --p5-crimson: #900c3f; }
        body { background-color: var(--p5-black); color: var(--p5-white); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Tema Dojo: Gelap dengan aksen merah darah */
        .persona-bg { background: linear-gradient(135deg, #110000 0%, #220000 100%); background-attachment: fixed; }
        .bg-lines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(45deg, #000, #000 10px, #0a0000 10px, #0a0000 20px); z-index: -1; opacity: 0.9; }
        
        .pixel-font { font-family: 'Press Start 2P', cursive; }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        .persona-border { border: 4px solid var(--p5-white); transform: skew(-2deg); box-shadow: 8px 8px 0px var(--p5-crimson); }
        .btn-persona { background-color: var(--p5-white); color: var(--p5-black); font-weight: 900; transform: skew(-5deg); transition: all 0.2s ease; border-left: 10px solid var(--p5-crimson); border-bottom: 4px solid #999; }
        .btn-persona:hover { background-color: var(--p5-crimson); color: var(--p5-white); transform: skew(-5deg) scale(1.05); padding-left: 1.5rem; border-color: #5a0827; }
        .gold-box { background-color: var(--p5-black); border: 2px solid var(--p5-gold); transform: skew(-10deg); box-shadow: 4px 4px 0px var(--p5-gold); }

        .bar-container { background: #333; height: 12px; transform: skew(-10deg); border: 2px solid white; position: relative; }
        .hp-fill { width: 100%; height: 100%; background: var(--p5-red); box-shadow: 0 0 10px var(--p5-red); transition: width 0.3s; }

        .samurai-hp-container { background: #333; height: 16px; border: 2px solid white; width: 100%; margin-top: 10px; transform: skew(-5deg); position: relative; }
        .samurai-hp-fill { background: var(--p5-crimson); width: 100%; height: 100%; transition: width 0.3s ease-out; box-shadow: 0 0 10px var(--p5-crimson); }

        .samurai-stance { animation: breathe 2.5s infinite ease-in-out; }
        @keyframes breathe { 0% { transform: scale(1) translateY(0); } 50% { transform: scale(1.02) translateY(-3px); } 100% { transform: scale(1) translateY(0); } }
        
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 40% { transform: translate(3px, 2px) rotate(-1deg); } 100% { transform: translate(1px, -1px) rotate(0deg); } }

        /* KANJI FOCUS: Font lebih besar untuk kuis Kanji */
        .kanji-display { font-size: 2.5rem; letter-spacing: 0.2rem; }
    </style>
</head>
<body class="persona-bg p-6 md:p-12">

    <div class="bg-lines"></div>

    <header class="max-w-5xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-4 text-black transform -rotate-1 shadow-[10px_10px_0px_#900c3f]">
        <div class="flex flex-col ml-2">
            <span class="pixel-font text-[8px] text-red-800 mb-1">STAGE 4 | QUEST 7</span>
            <h1 class="marker-font text-2xl md:text-3xl uppercase tracking-tighter">SAMURAI DOJO</h1>
        </div>
        
        <div class="flex flex-wrap gap-4 items-end mt-4 md:mt-0">
            <div class="w-24 md:w-32">
                <p class="pixel-font text-[10px] mb-1">HP <span id="hp-text-header" class="text-[8px] text-gray-400"></span></p>
                <div class="bar-container"><div id="player-hp" class="hp-fill"></div></div>
            </div>
            <div class="gold-box px-4 py-2 text-white text-right w-24">
                <p class="pixel-font text-[8px] text-yellow-400 mb-1">GOLD</p>
                <p id="gold-display" class="marker-font text-xl text-yellow-400">0</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
        
        <div class="flex flex-col items-center justify-center space-y-4">
            <div class="samurai-stance relative mt-8 flex flex-col items-center">
                <div class="w-48 h-48 bg-red-900 rounded-full absolute top-0 -z-10 mix-blend-screen blur-2xl"></div>
                
                <img src="ronin.webp" alt="Ronin Master" class="w-56 h-56 object-contain drop-shadow-[0_0_20px_rgba(144,12,63,0.8)] z-10">
                
                <div class="bg-black text-white marker-font px-4 py-1 rotate-3 border-2 border-[#900c3f] mt-2 w-64 text-center shadow-[4px_4px_0px_#900c3f] z-20">
                    RONIN MASTER LV. 60
                </div>
                <div class="w-64 samurai-hp-container -mt-1 z-10">
                    <div id="samurai-hp-bar" class="samurai-hp-fill"></div>
                    <p id="samurai-hp-text" class="absolute inset-0 text-[10px] pixel-font text-white leading-[12px] drop-shadow-md z-10 text-center">200/200</p>
                </div>
            </div>
            
            <div class="w-full persona-border bg-black p-6 relative mt-4">
                <div class="absolute -top-4 left-4 bg-[#900c3f] text-white px-3 py-1 marker-font text-lg skew-x-[-10deg]">BATTLE LOG</div>
                <p id="dialog-main" class="text-lg font-black mt-2 leading-relaxed text-red-200">「浪人が静かに刀を構えた...」</p>
                <p id="dialog-romaji" class="text-gray-400 italic text-sm mt-1">(Rounin ga shizuka ni katana o kamaeta... - Ronin bersiap dengan tenang...)</p>
            </div>
        </div>

        <div id="action-menu" class="grid grid-cols-1 gap-4">
            </div>
    </main>

    <script>
        // --- SISTEM BGM ---
        const bgm = new Audio('bgm.mp3');
        bgm.loop = true; 
        function handleBGM() {
            if (localStorage.getItem('playMusic') === 'true') {
                let savedTime = parseFloat(localStorage.getItem('musicTime')) || 0;
                bgm.currentTime = savedTime;
                bgm.play().catch(() => {});
                setInterval(() => { if (!bgm.paused) localStorage.setItem('musicTime', bgm.currentTime); }, 1000);
            }
        }
        window.addEventListener('load', handleBGM);
        window.addEventListener('click', () => { if (bgm.paused && localStorage.getItem('playMusic') === 'true') bgm.play(); }, { once: true });

        // --- LOAD DATA (PERSISTEN) ---
        let playerName = localStorage.getItem('playerName') || 'HERO';
        let playerGold = parseInt(localStorage.getItem('playerGold')) || 0;
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
        
        let maxPlayerHp = parseInt(localStorage.getItem('maxPlayerHp')) || 100;
        let savedHp = parseInt(localStorage.getItem('playerHp'));
        let playerHp = !isNaN(savedHp) ? savedHp : maxPlayerHp;

        // Ronin punya HP sangat tebal (Boss Class)
        let samuraiHp = 200;
        const maxSamuraiHp = 200;
        let isGameOver = false;

        document.getElementById('gold-display').innerText = playerGold;
        updateHpUI();

        function updateHpUI() {
            document.getElementById('player-hp').style.width = (playerHp / maxPlayerHp * 100) + '%';
            document.getElementById('hp-text-header').innerText = `(${playerHp}/${maxPlayerHp})`;
        }

        // --- DATA KUIS KANJI (CAMPURAN OPSI 2 & 3) ---
        const kanjiQuizzes = [
            // Opsi 2: Mata Elang (Look-alikes)
            { type: "MATA ELANG!", question: "Manakah Kanji untuk <b>'Samurai'</b>?", a: "待", b: "特", c: "侍", correct: 'c' },
            { type: "MATA ELANG!", question: "Manakah Kanji untuk <b>'Waktu'</b>?", a: "詩", b: "時", c: "待", correct: 'b' },
            { type: "MATA ELANG!", question: "Manakah Kanji untuk <b>'Matahari'</b>?", a: "日", b: "白", c: "目", correct: 'a' },
            
            // Opsi 3: Tebasan Beruntun (Jukugo)
            { type: "TEBASAN BERUNTUN!", question: "Lengkapi kata: <b>電 ___</b><br><span class='text-sm text-gray-400'>(Densha / Kereta)</span>", a: "車", b: "庫", c: "陣", correct: 'a' },
            { type: "TEBASAN BERUNTUN!", question: "Lengkapi kata: <b>仕 ___</b><br><span class='text-sm text-gray-400'>(Shigoto / Pekerjaan)</span>", a: "語", b: "事", c: "告", correct: 'b' },
            { type: "TEBASAN BERUNTUN!", question: "Lengkapi kata: <b>学 ___</b><br><span class='text-sm text-gray-400'>(Gakkou / Sekolah)</span>", a: "効", b: "校", c: "交", correct: 'b' }
        ];
        let currentQuiz = null;

        function renderMainMenu() {
            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <div class="bg-[#900c3f] p-2 transform -skew-x-12 inline-block mb-2 shadow-[4px_4px_0px_#ffffff]">
                    <p class="marker-font text-2xl px-2 text-white">FOCUS YOUR MIND!</p>
                </div>
                
                <button onclick="startKanjiQuiz()" class="btn-persona p-5 group text-left flex flex-col">
                    <span class="pixel-font text-sm">01. たたかう (Tatakau)</span>
                    <span class="font-bold text-gray-500 group-hover:text-black mt-1">- Konsentrasi penuh (Uji Kanji)</span>
                </button>

                <button onclick="battleAction('run')" class="btn-persona p-5 group text-left flex flex-col hover:bg-black border-[#900c3f] mt-4">
                    <span class="pixel-font text-sm text-[#900c3f]">02. にげる (Nigeru)</span>
                    <span class="font-bold text-gray-500 group-hover:text-red-500 mt-1">- Kabur dari pertarungan</span>
                </button>
            `;
        }
        
        renderMainMenu();

        function battleAction(action) {
            if(isGameOver) return; 
            if (action === 'run') {
                triggerGameOver("Kamu berbalik badan, dan tebasan mematikan langsung mengakhiri segalanya...");
            }
        }

        function startKanjiQuiz() {
            currentQuiz = kanjiQuizzes[Math.floor(Math.random() * kanjiQuizzes.length)];
            
            let badgeColor = currentQuiz.type === "MATA ELANG!" ? "bg-blue-600" : "bg-yellow-600";
            let textColor = currentQuiz.type === "MATA ELANG!" ? "text-white" : "text-black";

            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <div class="${badgeColor} p-2 transform -skew-x-12 inline-block shadow-[4px_4px_0px_#ffffff]">
                    <p class="marker-font text-xl px-2 ${textColor}">${currentQuiz.type}</p>
                </div>
                
                <div class="bg-black border-2 border-[#900c3f] p-4 mb-2 transform skew-x-[-2deg]">
                    <p class="font-bold text-white text-lg">${currentQuiz.question}</p>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <button onclick="checkAnswer('a')" class="btn-persona p-4 text-center border-gray-400 kanji-display font-black">${currentQuiz.a}</button>
                    <button onclick="checkAnswer('b')" class="btn-persona p-4 text-center border-gray-400 kanji-display font-black">${currentQuiz.b}</button>
                    <button onclick="checkAnswer('c')" class="btn-persona p-4 text-center border-gray-400 kanji-display font-black">${currentQuiz.c}</button>
                </div>
            `;
        }

        function checkAnswer(selectedOption) {
            const dialogMain = document.getElementById('dialog-main');
            const dialogRomaji = document.getElementById('dialog-romaji');
            
            document.body.classList.remove('shake');
            void document.body.offsetWidth;
            document.body.classList.add('shake');

            if (selectedOption === currentQuiz.correct) {
                // JAWABAN BENAR: Mas berhasil menangkis dan menyerang!
                let damage = inventory.includes("Katana") ? 70 : 45; 
                samuraiHp -= damage;
                if(samuraiHp < 0) samuraiHp = 0;

                document.getElementById('samurai-hp-bar').style.width = (samuraiHp / maxSamuraiHp * 100) + '%';
                document.getElementById('samurai-hp-text').innerText = samuraiHp + '/' + maxSamuraiHp;

                dialogMain.innerHTML = `「見事な集中力だ！」<br><span class='text-[#900c3f]'>渾身の反撃！ ${damage} ダメージ！</span>`;
                dialogRomaji.innerHTML = "(Migoto na shuuchuuryoku da! - Konsentrasi yang menakjubkan! Serangan balik!)";

                if(samuraiHp === 0) {
                    setTimeout(triggerWin, 800); 
                } else {
                    renderMainMenu();
                }

            } else {
                // JAWABAN SALAH: Tebasan Samurai/Ronin mematikan (Damage Super Besar!)
                let takenDamage = 50; 
                playerHp -= takenDamage;
                if(playerHp < 0) playerHp = 0;
                
                updateHpUI();
                
                dialogMain.innerHTML = `「迷iがあるな...！」<br><span class='text-red-500'>一閃！ ${takenDamage} ダメージ！</span>`;
                dialogRomaji.innerHTML = "(Mayoi ga aru na...! Issen! - Kau ragu-ragu...! Satu tebasan mematikan!)";

                if(playerHp <= 0) {
                    setTimeout(() => triggerGameOver("Konsentrasimu pecah. Pedang Ronin menebasmu tanpa ampun."), 800);
                } else {
                    renderMainMenu();
                }
            }
        }

        function triggerGameOver(customMessage) {
            isGameOver = true;
            document.getElementById('player-hp').style.width = '0%';
            const dialogMain = document.getElementById('dialog-main');
            
            dialogMain.innerHTML = "<span class='text-red-600'>「目の前が真っ暗になった...」</span>";
            
            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <div class="bg-black border-4 border-red-600 p-8 text-center transform skew-x-[-2deg] shadow-[8px_8px_0px_#d31212] mt-4">
                    <h1 class="marker-font text-5xl md:text-7xl mb-4 text-red-600 glitch-text">GAME OVER</h1>
                    <p class="pixel-font text-xs mb-8 text-gray-400 leading-relaxed">${customMessage}</p>
                    <a href="index.html" class="inline-block bg-white text-black px-8 py-4 border-2 border-black hover:bg-red-600 hover:text-white transition-colors marker-font text-2xl transform skew-x-[-10deg]">
                        TRY AGAIN
                    </a>
                </div>
            `;
        }

        function triggerWin() {
            isGameOver = true;
            
            playerGold += 600; // Hadiah Boss Class
            localStorage.setItem('playerGold', playerGold);
            localStorage.setItem('playerHp', playerHp); 
            document.getElementById('gold-display').innerText = playerGold;

            const menu = document.getElementById('action-menu');
            menu.innerHTML = `
                <div class="bg-white border-4 border-black p-8 text-center transform skew-x-[2deg] shadow-[8px_8px_0px_#900c3f] mt-4">
                    <h1 class="marker-font text-4xl md:text-5xl mb-4 text-black">RONIN DEFEATED!</h1>
                    <p class="pixel-font text-[10px] mb-2 text-gray-600">REWARDS:</p>
                    <p class="marker-font text-yellow-500 text-3xl">+ 600 GOLD</p>
                    <p class="marker-font text-red-800 text-sm mt-2 font-bold">"KANJI MASTER!"</p>
                    
                    <a href="quest8.html" class="inline-block mt-8 bg-black text-white px-8 py-4 border-2 border-white hover:bg-[#900c3f] transition-colors marker-font text-xl transform skew-x-[-10deg]">
                        NEXT: TO THE GATE ▶
                    </a>
                </div>
            `;
        }
    </script>
</body>
</html>
