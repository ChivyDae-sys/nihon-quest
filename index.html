<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihon-Quest: Start</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Permanent+Marker&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --p5-red: #d31212; --p5-black: #000000; --p5-white: #ffffff; }
        
        body { 
            background-color: var(--p5-black);
            color: var(--p5-white); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* Background Garis Miring Berjalan */
        .bg-lines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(45deg, #000, #000 15px, #0a0000 15px, #0a0000 30px); z-index: -1; }
        
        .pixel-font { font-family: 'Press Start 2P', cursive; }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        
        /* Animasi Judul Glitch */
        .glitch-title { 
            font-size: 4rem; 
            text-shadow: 5px 5px 0px var(--p5-red), -3px -3px 0px var(--p5-white); 
            animation: glitch 2s infinite; 
            transform: skew(-10deg);
        }
        @media (min-width: 768px) { .glitch-title { font-size: 7rem; } }
        
        @keyframes glitch { 
            0% { transform: skew(-10deg) translate(0); } 
            20% { transform: skew(-10deg) translate(-2px, 2px); } 
            40% { transform: skew(-10deg) translate(-2px, -2px); } 
            60% { transform: skew(-10deg) translate(2px, 2px); } 
            80% { transform: skew(-10deg) translate(2px, -2px); } 
            100% { transform: skew(-10deg) translate(0); } 
        }

        /* Tombol Menu ala Phantom */
        .menu-btn { 
            background-color: transparent; 
            color: var(--p5-white); 
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            text-align: left;
            padding: 1rem 2rem;
            margin-bottom: 1rem;
            border-left: 8px solid var(--p5-white);
            transform: skew(-5deg);
            transition: all 0.2s ease;
            display: block;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
        }

        .menu-btn:hover { 
            background-color: var(--p5-red); 
            color: var(--p5-black); 
            border-left: 8px solid var(--p5-black); 
            transform: skew(-5deg) translateX(10px); 
        }

        .menu-wrapper { animation: slideIn 1s ease-out forwards; opacity: 0; }
        @keyframes slideIn { 0% { transform: translateX(-50px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }

        /* Input Nama Stylized */
        .name-input {
            background-color: rgba(211, 18, 18, 0.1);
            color: var(--p5-white);
            border: 2px solid var(--p5-red);
            padding: 1rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            width: 100%;
            max-width: 400px;
            transform: skew(-5deg);
            margin-bottom: 1.5rem;
            outline: none;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .name-input:focus {
            background-color: rgba(211, 18, 18, 0.3);
            border-color: var(--p5-white);
            box-shadow: 0 0 15px var(--p5-red);
        }

    </style>
</head>
<body class="p-6 md:p-16">

    <div class="bg-lines"></div>

    <main class="w-full max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-12 z-10">
        
        <div class="flex-1 text-center md:text-left">
            <p class="pixel-font text-xs text-red-600 tracking-widest mb-4 border-b-2 border-red-600 pb-2 inline-block">JAPANESE LEARNING RPG</p>
            <h1 class="marker-font text-white glitch-title leading-none">NIHON<br>QUEST</h1>
            <p class="text-gray-400 mt-6 font-mono font-bold text-sm tracking-widest">v1.0 - OPERATION: DAWN</p>
        </div>

        <div id="main-menu" class="flex-1 w-full flex flex-col items-center md:items-end menu-wrapper" style="animation-delay: 0.5s;">
            
            <button onclick="showNameInput()" class="menu-btn group">
                <span class="text-xs text-red-500 mr-2 group-hover:text-black">01.</span> START MISSION
            </button>

            <button onclick="toggleBGM()" class="menu-btn group">
                <span class="text-xs text-red-500 mr-2 group-hover:text-black">02.</span> <span id="bgm-text" class="group-hover:text-black">BGM: OFF 🔇</span>
            </button>

            <button onclick="window.location.href='highscore.html'" class="menu-btn group">
                <span class="text-xs text-red-500 mr-2 group-hover:text-black">03.</span> HALL OF FAME
            </button>

            <button onclick="window.location.href='archive.html'" class="menu-btn group">
                <span class="text-xs text-red-500 mr-2 group-hover:text-black">04.</span> INTEL ARCHIVE
            </button>

            <button onclick="openBugReport()" class="menu-btn group">
                <span class="text-xs text-red-500 mr-2 group-hover:text-black">05.</span> REPORT BUG
            </button>

            <button onclick="openFeedback()" class="menu-btn group">
                <span class="text-xs text-red-500 mr-2 group-hover:text-black">06.</span> FEEDBACK
            </button>

        </div>

        <div id="name-input-menu" class="flex-1 w-full flex flex-col items-center md:items-end menu-wrapper hidden">
            
            <p class="pixel-font text-[10px] text-red-500 mb-2 w-full max-w-[400px] text-left">ENTER AGENT CODENAME:</p>
            
            <input type="text" id="player-codename" class="name-input" placeholder="HERO" maxlength="12" autocomplete="off">
            
            <button onclick="startGame()" class="menu-btn group">
                <span class="text-xs text-red-500 mr-2 group-hover:text-black">></span> ENTER MISSION
            </button>

            <button onclick="hideNameInput()" class="menu-btn group border-gray-600 text-gray-400 hover:bg-gray-400 hover:border-gray-800 hover:text-black">
                <span class="text-xs text-gray-500 mr-2 group-hover:text-black"><</span> BACK TO MENU
            </button>

        </div>
    </main>

    <script>
        // --- SISTEM BGM DENGAN PERSISTENSI WAKTU ---
        const bgmAudio = new Audio('bgm.mp3'); 
        bgmAudio.loop = true;
        
        // Memaksa BGM mati (OFF) setiap kali layar judul dibuka dari awal
        let isMusicPlaying = false; 
        localStorage.setItem('playMusic', 'false');
        localStorage.setItem('musicTime', '0'); // Waktu lagu di-reset ke 0

        function updateBgmUI() {
            const bgmText = document.getElementById('bgm-text');
            if (isMusicPlaying) {
                bgmText.innerText = "BGM: ON 🔊";
            } else {
                bgmText.innerText = "BGM: OFF 🔇";
            }
        }

        // Interval untuk selalu menyimpan detik lagu jika sedang ON
        setInterval(() => {
            if (isMusicPlaying && !bgmAudio.paused) {
                localStorage.setItem('musicTime', bgmAudio.currentTime);
            }
        }, 500); 

        window.addEventListener('beforeunload', () => {
            if (isMusicPlaying && !bgmAudio.paused) {
                localStorage.setItem('musicTime', bgmAudio.currentTime);
            }
        });

        function toggleBGM() {
            isMusicPlaying = !isMusicPlaying; 
            localStorage.setItem('playMusic', isMusicPlaying); 
            
            if (isMusicPlaying) {
                let savedTime = parseFloat(localStorage.getItem('musicTime')) || 0;
                bgmAudio.currentTime = savedTime;
                bgmAudio.play().catch(e => {
                    alert('Sistem: Browser memblokir audio. Silakan klik layar sekali lagi!');
                });
            } else {
                bgmAudio.pause();
            }
            updateBgmUI();
        }

        updateBgmUI();

        // --- SISTEM MENU TRANSISI ---
        const mainMenu = document.getElementById('main-menu');
        const nameInputMenu = document.getElementById('name-input-menu');
        const inputField = document.getElementById('player-codename');

        function showNameInput() {
            mainMenu.classList.add('hidden'); 
            nameInputMenu.classList.remove('hidden'); 
            inputField.focus(); 
        }

        function hideNameInput() {
            nameInputMenu.classList.add('hidden'); 
            mainMenu.classList.remove('hidden'); 
        }

        // --- BUG FIX: MODAL AWAL 1000 GOLD ---
        function startGame() {
            let enteredName = inputField.value.trim();
            if (enteredName === "") {
                enteredName = "HERO";
            }

            // 1. Simpan Nama
            localStorage.setItem('playerName', enteredName);

            // 2. HARD RESET STATUS (Kasih modal 1000 Gold!)
            localStorage.setItem('playerGold', '1000'); // <--- INI UDAH JADI 1000
            localStorage.setItem('playerHp', '100');
            localStorage.setItem('maxPlayerHp', '100');
            localStorage.setItem('inventory', JSON.stringify([])); 

            // Animasi transisi
            document.body.style.transition = "opacity 0.8s ease";
            document.body.style.opacity = "0";
            
            setTimeout(() => {
                window.location.href = 'quest1.html'; 
            }, 800);
        }

        // --- INTEGRASI WHATSAPP REPORT & FEEDBACK ---
        function openBugReport() {
            const nomorWA = "6285848966250"; // Jangan lupa ganti nomornya ya Mas
            const pesan = "Lapor sir! Saya nemu bug di Nihon-Quest nih. \n\nDetail Bug: ";
            const linkWA = `https://wa.me/${6285848966250}?text=${encodeURIComponent(pesan)}`;
            window.open(linkWA, '_blank');
        }

        function openFeedback() {
            const nomorWA = "6285848966250"; // Jangan lupa ganti nomornya ya Mas
            const pesan = "Oi Developer! gua mau ngasih kritik & saran buat game Nihon-Quest: \n\nSaran saya: ";
            const linkWA = `https://wa.me/${6285848966250}?text=${encodeURIComponent(pesan)}`;
            window.open(linkWA, '_blank');
        }
    </script>
</body>
</html>
